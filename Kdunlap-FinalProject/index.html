<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArcGIS Maps SDK for JavaScript Vite TypeScript template</title>
    <link rel="icon" href="data:;base64,=" />
  </head>

  <body>
    <!-- The Shell component is used as a layout for this template -->
    <calcite-shell content-behind>
      <calcite-navigation slot="header">
        <!-- Heading and description dynamically populated in main.js -->
        <calcite-navigation-logo heading-level="1" slot="logo"></calcite-navigation-logo>
      </calcite-navigation>

      <!-- The Map component fits to the size of the parent element -->
      <!-- The basemap, extent, zoom and more are provided by the Web Map (item-id) -->
      <arcgis-map item-id="d79e91bd5f9d4bcdb05292a902d1c472">
        <arcgis-zoom slot="top-left"></arcgis-zoom>

        <arcgis-directions slot="top-right"
        use-default-layer
        ></arcgis-directions>

        <arcgis-search slot="bottom-right"></arcgis-search>

      </arcgis-map>
    </calcite-shell>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
